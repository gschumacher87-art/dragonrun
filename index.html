<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Cave</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== SET SIZE FIRST (fix) =====
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER =====
let y = canvas.height / 2;
let velocity = 0;
const gravity = 0.5;
const lift = -8;
const size = 30;
const x = 100;

// ===== INPUT =====
document.addEventListener("touchstart", flap);
document.addEventListener("mousedown", flap);

function flap() {
  velocity = lift;
}

// ===== CAVE =====
let caves = [];
let gap = 180;
let width = 80;
let speed = 3;

function spawnCave() {
  const topHeight = Math.random() * (canvas.height - gap);
  caves.push({
    x: canvas.width,
    top: topHeight
  });
}

// ===== UPDATE =====
function update() {
  velocity += gravity;
  y += velocity;

  if (caves.length === 0 || caves[caves.length - 1].x < canvas.width - 250) {
    spawnCave();
  }

  for (let c of caves) {
    c.x -= speed;
  }

  caves = caves.filter(c => c.x + width > 0);
}

// ===== COLLISION =====
function checkCollision() {
  for (let c of caves) {
    if (x + size > c.x && x < c.x + width) {
      if (y < c.top || y + size > c.top + gap) {
        reset();
      }
    }
  }

  if (y < 0 || y + size > canvas.height) {
    reset();
  }
}

function reset() {
  y = canvas.height / 2;
  velocity = 0;
  caves = [];
}

// ===== DRAW =====
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // caves
  ctx.fillStyle = "gray";
  for (let c of caves) {
    ctx.fillRect(c.x, 0, width, c.top);
    ctx.fillRect(c.x, c.top + gap, width, canvas.height);
  }

  // dragon
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, size, size);

  // debug text
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("RUNNING", 20, 40);
}

// ===== LOOP =====
function loop() {
  update();
  checkCollision();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
