<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Cave</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== PLAYER =====
let y = canvas.height / 2;
let velocity = 0;
const gravity = 0.5;
const lift = -8;
const size = 40;
const x = 100;

// ===== INPUT =====
document.addEventListener("touchstart", flap);
document.addEventListener("mousedown", flap);

function flap() {
  velocity = lift;
}

// ===== CAVE =====
let caves = [];
let gap = 220;
let width = 120;
let speed = 3;

function spawnCave() {
  const topHeight = Math.random() * (canvas.height - gap);
  caves.push({ x: canvas.width, top: topHeight });
}

// ===== UPDATE =====
function update() {
  velocity += gravity;
  y += velocity;

  if (caves.length === 0 || caves[caves.length - 1].x < canvas.width - 300) {
    spawnCave();
  }

  for (let c of caves) {
    c.x -= speed;
  }

  caves = caves.filter(c => c.x + width > 0);
}

// ===== COLLISION =====
function checkCollision() {
  for (let c of caves) {
    if (x + size > c.x && x < c.x + width) {
      if (y < c.top || y + size > c.top + gap) {
        reset();
      }
    }
  }

  if (y < 0 || y + size > canvas.height) reset();
}

function reset() {
  y = canvas.height / 2;
  velocity = 0;
  caves = [];
}

// ===== DRAW =====
function draw() {
  // background gradient (cave feel)
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#0a0a0a");
  grad.addColorStop(1,"#1a1a1a");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // caves (rough edges instead of flat boxes)
  ctx.fillStyle = "#555";

  for (let c of caves) {
    drawRock(c.x, 0, width, c.top);
    drawRock(c.x, c.top + gap, width, canvas.height);
  }

  // dragon
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, size, size);
}

// ===== ROCK DRAW (gives cave feel) =====
function drawRock(x, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, y);

  for (let i = 0; i <= w; i += 10) {
    let offset = Math.random() * 10;
    ctx.lineTo(x + i, y + offset);
  }

  ctx.lineTo(x + w, y + h);

  for (let i = w; i >= 0; i -= 10) {
    let offset = Math.random() * 10;
    ctx.lineTo(x + i, y + h - offset);
  }

  ctx.closePath();
  ctx.fill();
}

// ===== LOOP =====
function loop() {
  update();
  checkCollision();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
