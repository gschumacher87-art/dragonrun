<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Cave</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let y = canvas.height / 2;
let velocity = 0;
const gravity = 0.5;
const lift = -8;
const size = 40;
const x = 100;

// INPUT
document.addEventListener("touchstart", flap);
document.addEventListener("mousedown", flap);

function flap() {
  velocity = lift;
}

// CAVE
let segments = [];
let segmentWidth = 20;
let speed = 3;

let gap = 200;

let centerY = canvas.height / 2;
let targetCenterY = centerY;

let roughness = 120;
let changeRate = 0.25;

// INIT
for (let i = 0; i < canvas.width / segmentWidth + 2; i++) {
  segments.push({
    x: i * segmentWidth,
    center: centerY
  });
}

// UPDATE
function update() {
  velocity += gravity;
  y += velocity;

  if (Math.random() < changeRate) {
    targetCenterY += (Math.random() - 0.5) * roughness;
  }

  targetCenterY = Math.max(gap/2 + 40, Math.min(canvas.height - gap/2 - 40, targetCenterY));

  centerY += (targetCenterY - centerY) * 0.25;

  for (let s of segments) {
    s.x -= speed;
  }

  if (segments[0].x + segmentWidth < 0) {
    segments.shift();
  }

  let last = segments[segments.length - 1];
  let variation = (Math.random() - 0.5) * 140;

  segments.push({
    x: last.x + segmentWidth,
    center: centerY + variation
  });
}

// COLLISION
function checkCollision() {
  for (let s of segments) {
    if (x + size > s.x && x < s.x + segmentWidth) {

      let top = s.center - gap / 2;
      let bottom = s.center + gap / 2;

      if (y < top || y + size > bottom) {
        reset();
      }
    }
  }

  if (y < 0 || y + size > canvas.height) reset();
}

// RESET
function reset() {
  y = canvas.height / 2;
  velocity = 0;
  segments = [];

  centerY = canvas.height / 2;
  targetCenterY = centerY;

  for (let i = 0; i < canvas.width / segmentWidth + 2; i++) {
    segments.push({
      x: i * segmentWidth,
      center: centerY
    });
  }
}

// DRAW
function draw() {
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#0a0a0a");
  grad.addColorStop(1,"#1a1a1a");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#555";

  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let s of segments) {
    ctx.lineTo(s.x, s.center - gap / 2);
  }
  ctx.lineTo(canvas.width, 0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  for (let s of segments) {
    ctx.lineTo(s.x, s.center + gap / 2);
  }
  ctx.lineTo(canvas.width, canvas.height);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "red";
  ctx.fillRect(x, y, size, size);
}

// LOOP
function loop() {
  update();
  checkCollision();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
