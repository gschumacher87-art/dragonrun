<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Cave</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ===== SIZE =====
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== IMAGES =====
const bg = new Image();
bg.src = "https://i.imgur.com/8bKQXQp.jpg"; // cave background

const caveTop = new Image();
caveTop.src = "https://i.imgur.com/6RLQ1bX.png";

const caveBottom = new Image();
caveBottom.src = "https://i.imgur.com/6RLQ1bX.png";

// ===== PLAYER =====
let y = canvas.height / 2;
let velocity = 0;
const gravity = 0.5;
const lift = -8;
const size = 40;
const x = 100;

// ===== INPUT =====
document.addEventListener("touchstart", flap);
document.addEventListener("mousedown", flap);

function flap() {
  velocity = lift;
}

// ===== CAVE =====
let caves = [];
let gap = 220;
let width = 120;
let speed = 3;

function spawnCave() {
  const topHeight = Math.random() * (canvas.height - gap);
  caves.push({
    x: canvas.width,
    top: topHeight
  });
}

// ===== UPDATE =====
function update() {
  velocity += gravity;
  y += velocity;

  if (caves.length === 0 || caves[caves.length - 1].x < canvas.width - 300) {
    spawnCave();
  }

  for (let c of caves) {
    c.x -= speed;
  }

  caves = caves.filter(c => c.x + width > 0);
}

// ===== COLLISION =====
function checkCollision() {
  for (let c of caves) {
    if (x + size > c.x && x < c.x + width) {
      if (y < c.top || y + size > c.top + gap) {
        reset();
      }
    }
  }

  if (y < 0 || y + size > canvas.height) reset();
}

function reset() {
  y = canvas.height / 2;
  velocity = 0;
  caves = [];
}

// ===== DRAW =====
function draw() {
  // background
  ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  // caves
  for (let c of caves) {
    // top
    ctx.drawImage(caveTop, c.x, 0, width, c.top);

    // bottom (flip image)
    ctx.save();
    ctx.translate(c.x + width, c.top + gap);
    ctx.scale(-1, -1);
    ctx.drawImage(caveBottom, 0, 0, width, canvas.height);
    ctx.restore();
  }

  // dragon (still simple)
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, size, size);
}

// ===== LOOP =====
function loop() {
  update();
  checkCollision();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
